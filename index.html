<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Story Vault</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Pixel Font That Actually Works -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body class="theme1">

<header>
<h1>📖 My Story Vault</h1>
<p>Stories stored in enchanted books</p>

<div class="picker-wrap">
<label>Choose Theme</label>
<select id="themePicker"></select>
</div>
</header>

<div class="container">

<div class="story-card"
onclick="openStory(
'The Nether Portal',
'One rainy night a ruined portal glowed beneath the village...'
)">
<h2>The Nether Portal</h2>
<p>Adventure beyond the overworld.</p>
</div>

<div class="story-card"
onclick="openStory(
'The End Dragon',
'The obsidian towers rose over the void as the dragon circled above...'
)">
<h2>The End Dragon</h2>
<p>The final boss awaits.</p>
</div>

</div>

<!-- Minecraft Book -->
<div id="popup" class="hidden">
  <div class="mc-book">

    <div class="book-page left-page">
      <div class="pixel-title">BOOK</div>
      <div class="page-lines"></div>
    </div>

    <div class="book-page right-page">
      <button class="close-btn" onclick="closeStory()">Done</button>

      <h2 id="title"></h2>

      <div class="book-text">
        <p id="content"></p>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
