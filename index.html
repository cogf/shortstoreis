<!DOCTYPE html>
<div class="page">

<div class="sidebar">
<div class="logo">STOREIS</div>
<div class="subtitle">Short Stories</div>

<select>
<option>Classic Theme</option>
<option>Nether Theme</option>
<option>End Theme</option>
</select>
</div>

<div class="library">

<!-- STORY 1 -->
<div class="book" onclick="openStory('The Lost Portal','Replace this with your full story.')">
<div class="corner top"></div>
<div class="corner bottom"></div>

<div class="header-row">
<div class="icon"></div>
<h2>The Lost Portal</h2>
</div>

<div class="divider"></div>
<p>An ancient ruined portal appears in the woods...</p>
</div>


<!-- STORY 2 -->
<div class="book" onclick="openStory('Ender Library','Put another story here.')">
<div class="corner top"></div>
<div class="corner bottom"></div>

<div class="header-row">
<div class="icon"></div>
<h2>Ender Library</h2>
</div>

<div class="divider"></div>
<p>A hidden library floats in the End.</p>
</div>

</div>
</div>


<div id="overlay" class="overlay">
<div class="reader">
<button onclick="closeStory()">Close</button>
<div id="storyTitle"></div>
<div id="storyText"></div>
</div>
</div>

<script>
function openStory(title,text){
document.getElementById('storyTitle').textContent=title;
document.getElementById('storyText').textContent=text;
document.getElementById('overlay').classList.add('show');
}

function closeStory(){
document.getElementById('overlay').classList.remove('show');
}
</script>

</body>
</html>
