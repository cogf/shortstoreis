<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>storeis</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body class="theme1">

<header>
<h1>storeis</h1>
<p>anonymous</p>

<div class="picker-wrap">
<label>themes</label>
<select id="themePicker"></select>
</div>
</header>


<div class="container">

<div class="story-card"
onclick="openStory(
'The Nether Portal',
[
'I found a ruined portal hidden beneath the village.',

'Stepping through, the Nether stretched forever in crimson fog.',

'I returned carrying ancient treasure and a secret.'
]
)">
<h2>The Nether Portal</h2>
<p>A test multi-page story.</p>
</div>


<div class="story-card"
onclick="openStory(
'Minecraft Notes',
[
'I play minecraft too much.',

'Diamonds are temporary.\nBuilding is forever.',

'That is all.'
]
)">
<h2>qwertyiop</h2>
<p>Second story test.</p>
</div>

</div>



<div id="popup" class="hidden">
<div class="mc-book">

<div class="book-page left-page">
<div class="pixel-title">
WRITTEN<br>BOOK
</div>
</div>


<div class="book-page right-page">

<button class="close-btn"
onclick="closeStory()">
done
</button>

<h2 id="title"></h2>

<div class="book-text">
<p id="content"></p>
</div>

<div class="page-nav">

<button
class="page-arrow"
onclick="prevPage()">
◀
</button>

<span class="page-number">
Page 1
</span>

<button
class="page-arrow"
onclick="nextPage()">
▶
</button>

</div>

</div>
</div>
</div>

<script src="script.js"></script>

</body>
</html>
